# Contrato de Variables para Plantillas de Documentos
# Motor de Reglas LSC — TGMS Platform
#
# ════════════════════════════════════════════════════════════════════════════
# VERSIÓN CANÓNICA: variables-plantillas-v1.1
# ════════════════════════════════════════════════════════════════════════════
#
# Etiqueta de versión única y autoritativa: "variables-plantillas-v1.1".
# Este es el valor que el código usa como fuente de verdad:
#   - src/lib/secretaria/legal-template-fixtures.ts (default contrato_variables_version)
#   - src/test/schema/secretaria-consejo-admin-templates-migration.test.ts
#
# ITEM-134 (2026-06-13): se DECLARA esta versión canónica y se PODA el contrato.
# Históricamente convivían 3 etiquetas de versión en la columna
# `contrato_variables_version` de las plantillas en Cloud:
#   - 'variables-plantillas-v1.1'  ← CANÓNICA (la usada por el código)
#   - '1.0.0'                       ← legacy (generador antiguo, ver changelog)
#   - '1.1.0'                       ← variante semver no usada por código
# Cualquier plantilla nueva debe etiquetarse con 'variables-plantillas-v1.1'.
# Las etiquetas '1.0.0' y '1.1.0' quedan deprecadas (ver sección `versiones_deprecadas`).
#
# Fuente autoritativa del catálogo lógico:
#   docs/legal-team/specs acuerdos/Especificacion_Tecnica_Motor_Reglas_LSC_v2_1.docx § 10
#
# Columnas de cada variable:
#   nombre: nombre de la variable Handlebars {{nombre}}
#   fuente: sistema_bbdd | sistema_motor | secretario_manual | qtsp
#   tipo: string | number | boolean | date | array
#   requerido: true | false
#   descripcion: descripción y ejemplo
#
# ─── Relación con el resolver de runtime ─────────────────────────────────────
# Este contrato describe el catálogo LÓGICO de variables (agrupadas por origen
# funcional). El resolver de runtime (src/lib/doc-gen/variable-resolver.ts) NO usa
# estas claves de `fuente`: opera con NAMESPACES de plantilla y normaliza las fuentes
# almacenadas en BD (dotted-paths como "entities.name") a estos namespaces vía
# `normalizeFuente`:
#
#   fuente lógica (este YAML)   →   namespace del resolver (runtime)
#   ─────────────────────────       ──────────────────────────────────
#   sistema_bbdd                →   ENTIDAD (entities.*) · ORGANO (governing_bodies.*
#                                   + condiciones_persona) · REUNION (meetings.* +
#                                   agenda) · EXPEDIENTE (agreements.* — el acuerdo)
#   sistema_motor               →   MOTOR (resultado del motor de reglas LSC)
#   secretario_manual           →   USUARIO (capa3 editable del expediente)
#   qtsp                        →   QTSP / SISTEMA (sellos EAD Trust, timestamps)
#
# Las plantillas referencian las variables con su namespace, p. ej.
# `{{ENTIDAD.es_cotizada}}`, `{{ORGANO.presidente}}`, `{{EXPEDIENTE.id}}`. La fuente
# de verdad operativa es el resolver; este YAML es documentación de cobertura.
#
# ════════════════════════════════════════════════════════════════════════════
# ESTADO REAL (ITEM-134 — 2026-06-13)
# ════════════════════════════════════════════════════════════════════════════
# De las 49 variables del catálogo, solo 6 aparecen hoy en alguna capa1 de plantilla
# ACTIVA (intersección verificada contra los placeholders de las 59 plantillas ACTIVA
# en Cloud). Las otras 43 son cobertura PROSPECTIVA: están especificadas pero ninguna
# plantilla viva las referencia todavía.
#
# Para que el contrato refleje la realidad sin perder información, las variables se
# agrupan ahora en dos bloques inequívocos:
#   - `variables_en_uso`      → las 6 vivas (referenciadas por plantillas ACTIVA)
#   - `variables_planificadas` → las 43 especificadas pero NO implementadas/usadas
#
# NOTA de cableado (deuda conocida, no resuelta en ITEM-134): los nombres lógicos de
# este contrato no coinciden con las claves planas que emite el resolver. Las plantillas
# vivas referencian familias del resolver (p. ej. `organo_nombre`, `hora_inicio`,
# `votos_favor`) que casan con el catálogo, pero también familias namespaced
# (`ENTIDAD.*`, `REUNION.*`, `EXPEDIENTE.*`) no listadas aquí. La reconciliación
# nombre-a-nombre completa entre contrato y resolver es trabajo aparte (ver backlog).

version: "variables-plantillas-v1.1"
version_semver: "1.1"
fecha_creacion: "2026-04-20"
fecha_reconciliacion: "2026-06-13"   # ITEM-134
total_variables_catalogo: 49
total_variables_en_uso: 6
total_variables_planificadas: 43

# Etiquetas de versión deprecadas que aún pueden aparecer en datos Cloud legacy.
# No usar para plantillas nuevas; migrar a "variables-plantillas-v1.1".
versiones_deprecadas:
  - "1.0.0"   # generador antiguo scripts/generate-variable-contract.ts
  - "1.1.0"   # variante semver no referenciada por código

# ═══════════════════════════════════════════════════════════════════════════
# VARIABLES EN USO (6) — referenciadas por al menos una plantilla ACTIVA
# ═══════════════════════════════════════════════════════════════════════════
# Intersección verificada entre el catálogo y los placeholders de las 59 ACTIVA.
# Estas son las únicas variables del contrato VIVAS hoy.

variables_en_uso:

  - nombre: organo_nombre
    fuente: sistema_bbdd
    tipo: string
    requerido: true
    descripcion: "Nombre del órgano. Ej: Consejo de Administración"

  - nombre: hora_inicio
    fuente: secretario_manual
    tipo: string
    requerido: false
    descripcion: "Hora de inicio de la sesión. Ej: 10:00 horas"

  - nombre: hora_fin
    fuente: secretario_manual
    tipo: string
    requerido: false
    descripcion: "Hora de fin de la sesión. Ej: 13:30 horas"

  - nombre: votos_favor
    fuente: secretario_manual
    tipo: number
    requerido: false
    descripcion: "Capital o número de votos a favor"

  - nombre: votos_contra
    fuente: secretario_manual
    tipo: number
    requerido: false
    descripcion: "Capital o número de votos en contra"

  - nombre: abstenciones
    fuente: secretario_manual
    tipo: number
    requerido: false
    descripcion: "Capital o número de abstenciones"

# ═══════════════════════════════════════════════════════════════════════════
# VARIABLES PLANIFICADAS / NO IMPLEMENTADAS (43)
# ═══════════════════════════════════════════════════════════════════════════
# Especificadas en el catálogo v2.1 pero NO usadas por ninguna plantilla ACTIVA
# a fecha de ITEM-134 (2026-06-13). Cobertura prospectiva: se conservan íntegras
# (no se borra información) para futuras plantillas, pero NO deben considerarse
# garantizadas por el resolver hasta que una plantilla viva las referencie y se
# verifique su resolución.

variables_planificadas:

  # ── SISTEMA_BBDD (11 planificadas) — auto-resueltas desde Supabase ───────────

  - nombre: empresa_nombre
    fuente: sistema_bbdd
    tipo: string
    requerido: true
    descripcion: "Denominación social completa. Ej: ARGA Seguros, S.A."

  - nombre: empresa_tipo_social
    fuente: sistema_bbdd
    tipo: string
    requerido: true
    descripcion: "Tipo societario: SA | SL | SLU | SAU. Ej: SA"

  - nombre: empresa_cif
    fuente: sistema_bbdd
    tipo: string
    requerido: true
    descripcion: "CIF de la entidad. Ej: A-12345678"

  - nombre: empresa_domicilio
    fuente: sistema_bbdd
    tipo: string
    requerido: true
    descripcion: "Domicilio social registrado. Ej: Calle Recoletos 37, 28004 Madrid"

  - nombre: empresa_registro_mercantil
    fuente: sistema_bbdd
    tipo: string
    requerido: false
    descripcion: "Datos de inscripción en el Registro Mercantil. Ej: T. 1234, F. 56, S. 8, H. M-78901"

  - nombre: organo_tipo
    fuente: sistema_bbdd
    tipo: string
    requerido: true
    descripcion: "Tipo de órgano: JUNTA_GENERAL | CONSEJO | COMISION_DELEGADA"

  - nombre: secretario_nombre
    fuente: sistema_bbdd
    tipo: string
    requerido: true
    descripcion: "Nombre completo del secretario firmante. Ej: Lucía Martín García"

  - nombre: secretario_cargo
    fuente: sistema_bbdd
    tipo: string
    requerido: true
    descripcion: "Cargo del secretario. Ej: Secretaria del Consejo de Administración"

  - nombre: presidente_nombre
    fuente: sistema_bbdd
    tipo: string
    requerido: false
    descripcion: "Nombre completo del presidente del órgano. Ej: Carlos Rodríguez Pérez"

  - nombre: capital_social
    fuente: sistema_bbdd
    tipo: number
    requerido: false
    descripcion: "Capital social total en euros. Ej: 100000000"

  - nombre: numero_socios
    fuente: sistema_bbdd
    tipo: number
    requerido: false
    descripcion: "Número de socios o accionistas. Ej: 3"

  # ── SISTEMA_MOTOR (12 planificadas) — auto-resueltas por el motor LSC ────────

  - nombre: adoption_mode
    fuente: sistema_motor
    tipo: string
    requerido: true
    descripcion: "Modo de adopción del acuerdo: MEETING | UNIVERSAL | NO_SESSION | UNIPERSONAL_SOCIO | UNIPERSONAL_ADMIN | CO_APROBACION | SOLIDARIO"

  - nombre: materia_acuerdo
    fuente: sistema_motor
    tipo: string
    requerido: true
    descripcion: "Código de materia del acuerdo. Ej: APROBACION_CUENTAS"

  - nombre: clase_materia
    fuente: sistema_motor
    tipo: string
    requerido: true
    descripcion: "Clase de la materia: ORDINARIA | ESTATUTARIA | ESTRUCTURAL"

  - nombre: quorum_requerido_pct
    fuente: sistema_motor
    tipo: number
    requerido: false
    descripcion: "Quórum de constitución requerido como fracción. Ej: 0.25"

  - nombre: mayoria_requerida_formula
    fuente: sistema_motor
    tipo: string
    requerido: false
    descripcion: "Fórmula de mayoría aplicada. Ej: favor > 0.5 * capital_presente"

  - nombre: inscribible
    fuente: sistema_motor
    tipo: boolean
    requerido: false
    descripcion: "Indica si el acuerdo requiere inscripción registral"

  - nombre: instrumento_requerido
    fuente: sistema_motor
    tipo: string
    requerido: false
    descripcion: "Instrumento de formalización: ESCRITURA | INSTANCIA | NINGUNO"

  - nombre: plazo_inscripcion_dias
    fuente: sistema_motor
    tipo: number
    requerido: false
    descripcion: "Plazo para inscripción en días naturales. Ej: 30"

  - nombre: compliance_ok
    fuente: sistema_motor
    tipo: boolean
    requerido: false
    descripcion: "Resultado global del motor de compliance: true | false"

  - nombre: blocking_issues_count
    fuente: sistema_motor
    tipo: number
    requerido: false
    descripcion: "Número de issues bloqueantes. 0 = sin bloqueos"

  - nombre: pactos_aplican
    fuente: sistema_motor
    tipo: boolean
    requerido: false
    descripcion: "Indica si algún pacto parasocial aplica al acuerdo"

  - nombre: pactos_ok
    fuente: sistema_motor
    tipo: boolean
    requerido: false
    descripcion: "Resultado de la evaluación de pactos parasociales. null si no aplican"

  # ── SECRETARIO_MANUAL (15 planificadas) — rellenadas por el secretario ───────

  - nombre: fecha_reunion
    fuente: secretario_manual
    tipo: date
    requerido: true
    descripcion: "Fecha de la reunión o fecha del acuerdo. Ej: 22 de abril de 2026"

  - nombre: lugar_reunion
    fuente: secretario_manual
    tipo: string
    requerido: false
    descripcion: "Lugar de celebración. Ej: Sede social, sala de juntas, Madrid"

  - nombre: numero_acta
    fuente: secretario_manual
    tipo: string
    requerido: true
    descripcion: "Número de acta correlativo. Ej: ACTA-CDA-2026-007"

  - nombre: texto_propuesta
    fuente: secretario_manual
    tipo: string
    requerido: true
    descripcion: "Texto de la propuesta de acuerdo tal como fue presentada"

  - nombre: texto_decision
    fuente: secretario_manual
    tipo: string
    requerido: true
    descripcion: "Texto del acuerdo adoptado, en forma imperativa"

  - nombre: asistentes_lista
    fuente: secretario_manual
    tipo: array
    requerido: false
    descripcion: "Lista de asistentes con nombre y cargo. Ej: [{nombre: 'Carlos Rodríguez', cargo: 'Presidente'}]"

  - nombre: convocatoria_fecha
    fuente: secretario_manual
    tipo: date
    requerido: false
    descripcion: "Fecha en que se cursó la convocatoria. Ej: 7 de abril de 2026"

  - nombre: convocatoria_medio
    fuente: secretario_manual
    tipo: string
    requerido: false
    descripcion: "Medio de convocatoria utilizado. Ej: correo electrónico certificado"

  - nombre: referencia_legal
    fuente: secretario_manual
    tipo: string
    requerido: false
    descripcion: "Referencia legal aplicable al acuerdo. Ej: artículo 253 LSC"

  - nombre: visto_bueno_presidente
    fuente: secretario_manual
    tipo: boolean
    requerido: false
    descripcion: "Indica si el presidente ha dado el visto bueno al acta"

  - nombre: numero_acuerdo_co_aprobacion
    fuente: secretario_manual
    tipo: string
    requerido: false
    descripcion: "Número de acuerdo en proceso CO_APROBACION. Ej: CO-APRO-2026-003"

  - nombre: admins_firmantes_co_aprobacion
    fuente: secretario_manual
    tipo: array
    requerido: false
    descripcion: "Lista de administradores firmantes en CO_APROBACION [{adminId, nombre, fechaFirma}]"

  - nombre: admin_solidario_nombre
    fuente: secretario_manual
    tipo: string
    requerido: false
    descripcion: "Nombre del administrador solidario actuante en modo SOLIDARIO"

  # ── QTSP (7 planificadas) — resueltas desde EAD Trust Digital Trust API ──────

  - nombre: qes_seal_token
    fuente: qtsp
    tipo: string
    requerido: false
    descripcion: "Token de sello electrónico cualificado QES emitido por EAD Trust"

  - nombre: qes_timestamp
    fuente: qtsp
    tipo: string
    requerido: false
    descripcion: "Timestamp cualificado de la firma QES. Ej: 2026-04-22T10:30:00Z"

  - nombre: qes_issuer
    fuente: qtsp
    tipo: string
    requerido: false
    descripcion: "Entidad emisora del certificado QES. Ej: EAD Trust Qualified CA v2"

  - nombre: tsq_token
    fuente: qtsp
    tipo: string
    requerido: false
    descripcion: "Token de sello de tiempo cualificado TSQ"

  - nombre: erds_delivery_ref
    fuente: qtsp
    tipo: string
    requerido: false
    descripcion: "Referencia de entrega certificada ERDS de EAD Trust"

  - nombre: erds_delivered_at
    fuente: qtsp
    tipo: string
    requerido: false
    descripcion: "Timestamp de entrega certificada ERDS. Ej: 2026-04-22T10:35:12Z"

  - nombre: sha512_document_hash
    fuente: qtsp
    tipo: string
    requerido: false
    descripcion: "Hash SHA-512 del documento en archival storage. 128 hex chars"

# ── Resumen del catálogo lógico (49) ─────────────────────────────────────────
# Conteo por fuente sobre el catálogo COMPLETO (en uso + planificadas).

resumen_catalogo:
  sistema_bbdd: 12       # 1 en uso (organo_nombre) + 11 planificadas
  sistema_motor: 12      # 0 en uso + 12 planificadas
  secretario_manual: 18  # 5 en uso (hora_inicio, hora_fin, votos_favor, votos_contra, abstenciones) + 13 planificadas
  qtsp: 7                # 0 en uso + 7 planificadas
  total: 49

